<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cantab Portraits</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #fff;
      color: #111;
    }

    header {
      padding: 40px 20px 20px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      margin: 0 0 6px;
      font-weight: 500;
      font-size: 34px;
    }

    .sub {
      margin: 0;
      opacity: 0.7;
      font-size: 15px;
    }

    .grid {
      max-width: 1100px;
      margin: 20px auto 60px;
      padding: 0 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }

    .grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>Cantab Portraits</h1>
  <p class="sub">Professional portraits and event photography</p>
</header>

<div class="grid">
  <img src="images/photo1.jpg">
  <img src="images/photo2.jpg">
  <img src="images/photo3.jpg">
  <img src="images/photo4.jpg">
  <img src="images/photo5.jpg">
  <img src="images/photo6.jpg">
  <img src="images/photo7.jpg">
  <img src="images/photo8.jpg">
  <img src="images/photo9.jpg">
  <img src="images/photo10.jpg">
  <img src="images/photo11.jpg">
  <img src="images/photo12.jpg">
  <img src="images/photo13.jpg">
  <img src="images/photo14.jpg">
</div>

<footer>
<p style="opacity:0.8; font-size:14px;">
Cantab Portraits is operated by Harvey Williams —
<a href="https://www.harveywilliams.com" target="_blank">
harveywilliams.com
</a>
</p>
  © Cantab Portraits 2026
</footer>

</body>
</html>
